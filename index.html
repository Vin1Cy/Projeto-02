<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Painel - Login</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="bg">
  <main class="auth">
    <section class="card">
      <h1 class="title">Dashboard</h1>
      <p class="subtitle">Faça login para acessar as funcionalidades administrativas.</p>

      <form id="loginForm" class="form">
        <label class="label">
          Email
          <input class="input" type="email" id="email" placeholder="seu@email.com" required />
        </label>

        <label class="label">
          Senha
          <input class="input" type="password" id="password" placeholder="••••••••" required />
        </label>

        <p class="hint" id="msg"></p>
        
        <button class="btn primary" type="submit" id="loginBtn">Entrar</button>

        <p class="hint" id="msg"></p>
      </form>

      <footer class="footer">
        <small>Registro é feito pelo administrador.</small>
      </footer>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
