<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Painel - Dashboard</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="bg">
  <header class="topbar">
    <div class="brand">
      <div class="logo">⛩</div>
      <div>
        <div class="brandTitle">Painel do Jogo</div>
        <div class="brandSub" id="whoami">Carregando…</div>
      </div>
    </div>

    <div class="topbarActions">
      <button class="btn" id="refreshBtn">Atualizar</button>
      <button class="btn danger" id="logoutBtn">Sair</button>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <nav class="nav" id="nav">
        <!-- Itens gerados por JS (com base no role) -->
      </nav>
    </aside>

    <main class="content">
      <section class="panelHeader">
        <h2 id="viewTitle">Visão geral</h2>
        <p id="viewDesc" class="muted">Resumo e ações rápidas.</p>
      </section>

      <section class="grid" id="view">
        <!-- Conteúdo de cada aba renderizado por JS -->
      </section>
    </main>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
